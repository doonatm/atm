<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doon - Login</title>
    <style>
        :root { --neon: #39ff14; --dark: #000; --card: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        
        .login-box { 
            background: var(--card); padding: 50px; border-radius: 20px; 
            border: 1px solid #333; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }
        
        h1 { color: var(--neon); margin-bottom: 30px; letter-spacing: 3px; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; background: #222; 
            border: 1px solid #444; border-radius: 10px; color: white; outline: none; text-align: center;
        }
        input:focus { border-color: var(--neon); }
        
        button { 
            width: 100%; padding: 15px; background: var(--neon); color: black; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>DOON</h1>
        <input type="password" id="pass" placeholder="PASSWORD" onkeypress="if(event.key==='Enter') verify()">
        <button onclick="verify()">Login to Dashboard</button>
    </div>

    <script>
        // Agar pehle se login hai toh seedha bhejo
        if(localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "dashboard.html";
        }

        function verify() {
            const p = document.getElementById('pass').value;
            if(p === "doon123") {
                // Yahan humne localStorage set kiya hai (isLoggedIn)
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = "dashboard.html";
            } else {
                alert("Galt Password! Sahi pass 'doon123' hai.");
            }
        }
    </script>
</body>
</html>
